<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>NGO Anderlecht</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color:#F8F4EF;
        }

        nav{
            background-color:#AFC8E8;
            padding:20px;
        }

        nav a{
            text-decoration:none;
            color:#3A3A3A;
            margin-right:20px;
            font-weight:bold;
        }

        .container{
            text-align:center;
            margin-top:80px;
        }

        h1{
            color:#7EA1C4;
        }

        p{
            color:#6B5B4D;
            font-size:18px;
        }

        footer{
            position:fixed;
            bottom:0;
            width:100%;
            background-color:#C8B6A6;
            text-align:center;
            padding:15px;
        }

    </style>

</head>
<body>

<nav>
    <a href="/">NGO</a>
    <a href="/new">Nieuw Evenement</a>
    <a href="/about">Over Ons</a>
</nav>

<div class="container">

    <h1>Laatste Evenementen</h1>

    <table style="margin:auto; width:80%; border-collapse: collapse; background:white;">

        <tr style="background-color:#AFC8E8;">
            <th style="padding:15px;">Titel</th>
            <th style="padding:15px;">Organisatie</th>
            <th style="padding:15px;">Details</th>
        </tr>

        <tr th:each="event : ${events}">

            <td style="padding:15px;" th:text="${event.titel}"></td>

            <td style="padding:15px;" th:text="${event.organisatie}"></td>

            <td style="padding:15px;">
                Details
            </td>

        </tr>

    </table>

</div>

<footer>
    © 2026 NGO Anderlecht
</footer>

</body>
</html>
